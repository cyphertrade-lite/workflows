name: Frontend Release CI (Web)

# Reusable RELEASE workflow for web frontends (PWA + Telegram Mini App).
#
# Unlike skill-release-ci.yml (Rust: binary built in CI, copied into Docker),
# the web build happens INSIDE the multi-stage Dockerfile (node build -> nginx).
# So this workflow only logs into GHCR, runs `docker build`, and pushes.
# No private deps -> the built-in GITHUB_TOKEN is enough (no CI_GITHUB_PAT).
#
# CI does NOT deploy — the VM deploy stays MANUAL:
#   ssh root@167.233.107.69 'cd /root/cypherlite && docker compose pull <svc> && docker compose up -d <svc>'
#
# Called by a service's .github/workflows/release-ci.yml on a version tag:
#
#   jobs:
#     release:
#       uses: cyphertrade-lite/workflows/.github/workflows/frontend-release-ci.yml@master
#       with:
#         IMAGE_NAME: frontend-app

on:
  workflow_call:
    inputs:
      IMAGE_NAME:
        description: "GHCR image name (== compose service name)"
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: self-hosted
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      NAMESPACE: cyphertrade-lite

    steps:
      - uses: actions/checkout@v4

      - name: Get the version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker build and push (static web built inside the image)
        run: |
          IMAGE="${REGISTRY}/${NAMESPACE}/${{ inputs.IMAGE_NAME }}"
          # Label links the GHCR package to the source repo even when the image
          # name (IMAGE_NAME) differs from the repo name.
          docker build \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.version=${VERSION}" \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"

      - name: Deploy note (manual — CI does not deploy)
        run: |
          echo "Pushed ${REGISTRY}/${NAMESPACE}/${{ inputs.IMAGE_NAME }}:${VERSION} (+ :latest)"
          echo "Deploy MANUALLY: ssh root@167.233.107.69 'cd /root/cypherlite && docker compose pull ${{ inputs.IMAGE_NAME }} && docker compose up -d ${{ inputs.IMAGE_NAME }}'"
