name: Feature CI

# Reusable FEATURE/PR workflow for CypherLite services.
#
# Build + lint + test only — no image, no deploy. Runs on the cyphertrade-lite
# self-hosted runners; private Rust deps (ITYFT/* + cyphertrade-lite/*) are
# fetched with a CI_GITHUB_PAT secret via git url.insteadOf.
#
# Called by a service's .github/workflows/feature-ci.yml:
#
#   jobs:
#     check:
#       uses: cyphertrade-lite/workflows/.github/workflows/feature-ci.yml@master
#       with:
#         UNITS: true
#       secrets: inherit

on:
  workflow_call:
    inputs:
      UNITS:
        description: "Run `cargo test --all`"
        required: false
        type: boolean
        default: true
    secrets:
      CI_GITHUB_PAT:
        description: "GitHub PAT with read access to private Rust deps (ITYFT/* + cyphertrade-lite/*) and submodules"
        required: true

permissions:
  contents: read

jobs:
  check:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Configure git auth for private cargo deps
        run: |
          git config --global url."https://x-access-token:${{ secrets.CI_GITHUB_PAT }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${{ secrets.CI_GITHUB_PAT }}@github.com/".insteadOf "git@github.com:"

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CI_GITHUB_PAT }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cyphertrade-lite-feature

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        if: ${{ inputs.UNITS }}
        run: cargo test --all
