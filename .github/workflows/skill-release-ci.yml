# Reusable RELEASE workflow for CypherLite services.
#
# Called by a service's .github/workflows/release-ci.yml on `gh release`:
#
#   jobs:
#     release:
#       uses: cyphertrade-lite/workflows/.github/workflows/skill-release-ci.yml@master
#       with:
#         service: wallet-service
#       secrets: inherit
#
# Flow: build image -> push to GHCR. Deploy is MANUAL (SSH into the VM and run
# `docker compose pull <service> && docker compose up -d <service>`); CI does not deploy.
name: skill-release-ci

on:
  workflow_call:
    inputs:
      service:
        description: "Service name (== GHCR image name and compose service name)"
        required: true
        type: string
    # GHCR push uses the built-in GITHUB_TOKEN (packages: write) — no extra secret needed.

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/cyphertrade-lite/${{ inputs.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy reminder
        run: |
          echo "Image pushed: ${{ env.IMAGE }}:${{ github.ref_name }}"
          echo "Deploy is manual: ssh root@167.233.107.69 'cd /root/cypherlite && docker compose pull ${{ inputs.service }} && docker compose up -d ${{ inputs.service }}'"
