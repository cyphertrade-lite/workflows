# Reusable RELEASE workflow for CypherLite services.
#
# Called by a service's .github/workflows/release-ci.yml on `gh release`:
#
#   jobs:
#     release:
#       uses: cyphertrade-lite/workflows/.github/workflows/skill-release-ci.yml@master
#       with:
#         service: wallet-service
#       secrets: inherit
#
# Flow: build image -> push to GHCR -> SSH into the VM -> docker compose pull + up.
name: skill-release-ci

on:
  workflow_call:
    inputs:
      service:
        description: "Service name (== GHCR image name and compose service name)"
        required: true
        type: string
      compose_dir:
        description: "Path to the compose project on the VM"
        required: false
        type: string
        default: /root/cypherlite
    secrets:
      VM_SSH_KEY:
        description: "Private SSH key for root@167.233.107.69"
        required: true
      # GHCR push uses the built-in GITHUB_TOKEN (packages: write) — no extra secret needed.

permissions:
  contents: read
  packages: write

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/cyphertrade-lite/${{ inputs.service }}
      VM_HOST: 167.233.107.69
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VM_HOST }}
          username: root
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ${{ inputs.compose_dir }}
            docker compose pull ${{ inputs.service }}
            docker compose up -d ${{ inputs.service }}
            docker compose ps ${{ inputs.service }}
